server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: orders
          uri: ${ORDERS_URL:http://localhost:8081}
          predicates:
            - Path=/orders/**

        - id: catalog
          uri: ${CATALOG_URL:http://localhost:8082}
          predicates:
            - Path=/products/**

        - id: inventory
          uri: ${INVENTORY_URL:http://localhost:8083}
          predicates:
            - Path=/inventory/**

management:
  endpoints:
    web:
      exposure:
        include: health,info